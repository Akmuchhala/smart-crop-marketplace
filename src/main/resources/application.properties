spring.application.name=marketplace
server.port=8080
# Enable static content mapping
spring.web.resources.static-locations=classpath:/static/
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=1000MB
# JWT Configuration
jwt.secret=${JWT_SECRET:dev_secret_key_for_local_testing_only}
# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/marketplace}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api-key=${CLOUDINARY_API_KEY:demo}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:demo}
