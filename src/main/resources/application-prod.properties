# Production Spring Boot Configuration
spring.application.name=marketplace
server.port=${PORT:8080}

# Production Active Profile Settings
spring.profiles.active=prod

# Disable default static resources mapping (hosted on Cloudflare Pages)
spring.web.resources.add-mappings=false

# MongoDB Configuration (Production database URI from Environment Variable)
spring.data.mongodb.uri=${MONGO_URI}

# Atlas Connection Pool Optimization for Free Tier
spring.data.mongodb.min-connections-per-host=2
spring.data.mongodb.max-connections-per-host=10
spring.data.mongodb.connect-timeout=10000
spring.data.mongodb.server-selection-timeout=10000

# File Upload Configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# JWT Secrets Configuration (Production Secret from Environment Variable)
jwt.secret=${JWT_SECRET}

# Production Logging Configuration (Reduce logging overhead)
logging.level.root=WARN
logging.level.com.smartcrops.marketplace=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# HTTP Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=2048

# Jackson Serialization Tweaks
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
